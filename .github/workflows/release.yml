name: Release Plugin

# Creates a GitHub release (with an installable plugin zip) whenever the
# plugin version in blt-events.php changes on main. The zip asset is what
# the bundled plugin-update-checker serves to sites as an update.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -oiP '^\s*\*\s*Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+[^\s]*' blt-events.php | head -n1)
          if [ -z "$VERSION" ]; then
            echo "Could not parse plugin version from blt-events.php" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p build/blt-events
          rsync -a . build/blt-events \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude '.gitignore' \
            --exclude '*.md'
          cd build
          zip -rq blt-events.zip blt-events
          echo "Zip contents (top level):"
          unzip -l blt-events.zip | head -n 20

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "BLT Events $TAG" \
            --generate-notes \
            build/blt-events.zip
